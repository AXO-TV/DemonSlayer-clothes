name: Build Mod

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.12'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-rfg-${{ hashFiles('**/*.gradle', '**/settings.gradle') }}
          restore-keys: |
            ${{ runner.os }}-rfg-

      - name: Build mod
        run: gradle build --no-daemon
        timeout-minutes: 40
        env:
          JAVA_OPTS: "-Xmx3g"

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: demonslayercosmetics-1.12.2
          path: build/libs/*.jar
          if-no-files-found: error

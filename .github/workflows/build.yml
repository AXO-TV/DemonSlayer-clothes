name: Build Mod

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  FORGE_VERSION: 1.12.2-14.23.5.2860
  FORGE_BASE: https://maven.minecraftforge.net/net/minecraftforge/forge/1.12.2-14.23.5.2860

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Install Gradle 4.10.3
        run: |
          wget -q https://services.gradle.org/distributions/gradle-4.10.3-bin.zip
          unzip -q gradle-4.10.3-bin.zip -d $HOME/gradle
          echo "$HOME/gradle/gradle-4.10.3/bin" >> $GITHUB_PATH

      - name: Generate Gradle wrapper
        run: |
          gradle wrapper --gradle-version 4.10.3 --distribution-type bin
          chmod +x gradlew

      - name: Pre-populate Forge Maven cache
        run: |
          CACHE_DIR="$HOME/.gradle/caches/modules-2/files-2.1/net.minecraftforge/forge/$FORGE_VERSION"
          mkdir -p "$CACHE_DIR"
          
          # Liste des artifacts nécessaires à ForgeGradle 2.3
          ARTIFACTS=(
            "forge-1.12.2-14.23.5.2860-userdev.jar"
            "forge-1.12.2-14.23.5.2860-installer.jar"
            "forge-1.12.2-14.23.5.2860.pom"
          )
          
          for ARTIFACT in "${ARTIFACTS[@]}"; do
            URL="$FORGE_BASE/$ARTIFACT"
            DEST="$CACHE_DIR/$ARTIFACT"
            echo "Téléchargement : $URL"
            wget -q --show-progress -O "$DEST" "$URL" || echo "AVERTISSEMENT : impossible de télécharger $ARTIFACT"
          done
          
          echo "Contenu du cache Forge :"
          ls -lh "$CACHE_DIR" 2>/dev/null || echo "(vide)"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-forge-${{ hashFiles('**/*.gradle') }}
          restore-keys: |
            ${{ runner.os }}-gradle-forge-
            ${{ runner.os }}-gradle-

      - name: Setup Forge workspace
        run: ./gradlew setupDecompWorkspace --no-daemon --stacktrace
        timeout-minutes: 40
        env:
          JAVA_OPTS: "-Xmx2g"
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=false"

      - name: Build mod
        run: ./gradlew build --no-daemon
        timeout-minutes: 20
        env:
          JAVA_OPTS: "-Xmx2g"
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: demonslayercosmetics-1.12.2
          path: build/libs/*.jar
          if-no-files-found: error

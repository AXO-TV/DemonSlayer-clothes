name: Build Mod

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Install Gradle 4.10.3
        run: |
          wget -q https://services.gradle.org/distributions/gradle-4.10.3-bin.zip
          unzip -q gradle-4.10.3-bin.zip -d $HOME/gradle
          echo "$HOME/gradle/gradle-4.10.3/bin" >> $GITHUB_PATH

      - name: Generate Gradle wrapper
        run: |
          gradle wrapper --gradle-version 4.10.3 --distribution-type bin
          chmod +x gradlew

      - name: Download Forge userdev jar and seed Gradle cache
        run: |
          FV="1.12.2-14.23.5.2860"
          BASE_URL="https://maven.minecraftforge.net/net/minecraftforge/forge/$FV"
          
          # Télécharger le userdev.jar
          wget -q "$BASE_URL/forge-$FV-userdev.jar" -O /tmp/forge-userdev.jar
          
          # Calculer le SHA1
          SHA1=$(sha1sum /tmp/forge-userdev.jar | cut -d' ' -f1)
          echo "SHA1 du userdev.jar : $SHA1"
          
          # Créer la structure exacte du cache Gradle pour cet artifact
          CACHE="$HOME/.gradle/caches/modules-2/files-2.1/net.minecraftforge/forge/$FV"
          mkdir -p "$CACHE/$SHA1"
          cp /tmp/forge-userdev.jar "$CACHE/$SHA1/forge-$FV-userdev.jar"
          
          echo "Cache créé :"
          find "$CACHE" -type f

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-forge-${{ hashFiles('**/*.gradle') }}
          restore-keys: |
            ${{ runner.os }}-gradle-forge-
            ${{ runner.os }}-gradle-

      - name: Setup Forge workspace
        run: ./gradlew setupDecompWorkspace --no-daemon --stacktrace
        timeout-minutes: 40
        env:
          JAVA_OPTS: "-Xmx2g"
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=false"

      - name: Build mod
        run: ./gradlew build --no-daemon
        timeout-minutes: 20
        env:
          JAVA_OPTS: "-Xmx2g"

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: demonslayercosmetics-1.12.2
          path: build/libs/*.jar
          if-no-files-found: error
